<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フルヒの森</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; width:100vw; height:100vh; cursor:pointer; }

#scene {
  position:relative; width:100%; height:100vh; overflow:hidden;
  background: #1a2e0a;
}

#bg {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:center;
  transition: transform 3.5s cubic-bezier(0.25,0.1,0.1,1), filter 3.5s ease;
  transform-origin: 50% 60%;
}

/* 木のオーバーレイ（左右） */
.tree-left, .tree-right {
  position:absolute; top:0; bottom:0; width:28%;
  z-index:2; pointer-events:none;
  transition: transform 3.5s cubic-bezier(0.25,0.1,0.1,1);
}
.tree-left  { left:0;  transform-origin: left center; }
.tree-right { right:0; transform-origin: right center; }

/* 暗転オーバーレイ */
#overlay {
  position:absolute; inset:0; background:#000;
  opacity:0; z-index:10; pointer-events:none;
  transition: opacity 1.8s ease 2s;
}

/* ヒントテキスト */
#hint {
  position:absolute; bottom:8%; left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,0.85);
  font-family:"Hiragino Kaku Gothic Pro", sans-serif;
  font-size:clamp(12px,2.5vw,18px);
  letter-spacing:0.15em;
  text-shadow:0 2px 8px rgba(0,0,0,0.7);
  z-index:3;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity:0.6; }
  50%      { opacity:1; }
}

/* 入る時の揺れ */
#scene.entering #bg {
  transform: scale(2.2) translateY(-8%);
  filter: brightness(1.3);
}
#scene.entering .tree-left  { transform: translateX(-60%) rotate(-8deg); }
#scene.entering .tree-right { transform: translateX(60%)  rotate(8deg); }
#scene.entering #overlay    { opacity:1; }
#scene.entering #hint       { opacity:0; transition: opacity 0.3s; }
</style>
</head>

<script>
const scene = document.getElementById("scene");
let entered = false;

function enter() {
  if (entered) return;
  entered = true;
  scene.classList.add("entering");
  // 暗転完了後に生息地ページへ
  setTimeout(() => {
    window.location.href = "habitat.html";
  }, 3600);
}

document.getElementById("scene").addEventListener("click", enter);
document.getElementById("scene").addEventListener("touchend", (e) => {
  e.preventDefault(); enter();
}, { passive: false });
</script>
